# cargo-deny configuration for FerroML
# https://embarkstudios.github.io/cargo-deny/

[graph]
# Include all targets for comprehensive checking
all-features = true
exclude = []

# ============================================================
# ADVISORIES - Security vulnerability checking
# ============================================================
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# Treat unmaintained crates as warnings, not errors
ignore = [
    # bincode 1.x is used by polars, unmaintained but widely used
    "RUSTSEC-2025-0141",
    # instant is used by argmin, unmaintained but not security-critical
    "RUSTSEC-2024-0384",
    # paste is unmaintained but widely used and stable
    "RUSTSEC-2024-0436",
]

# ============================================================
# LICENSES - License compliance checking
# ============================================================
[licenses]
# We use dual-license MIT OR Apache-2.0, so we accept both
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "Zlib",
    "0BSD",
    "CC0-1.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "OpenSSL",
]
# Confidence threshold for license detection
confidence-threshold = 0.9
# List of crates whose license is to be clarified
clarify = []
# Exception for ring which uses custom OpenSSL-like license
exceptions = [
    { name = "ring", allow = ["OpenSSL"] },
]

[licenses.private]
# If true, ignores workspace crates that aren't published
ignore = true
# List of private registries to check
registries = []

# ============================================================
# BANS - Dependency banning/duplicate detection
# ============================================================
[bans]
# Deny multiple versions of the same crate (with exceptions)
multiple-versions = "warn"
# Skip checking for duplicate versions of these crates
skip = []
# Allow specific duplicate version combinations
skip-tree = []
# Warn about wildcards in dependencies
wildcards = "warn"
# Deny specific crates entirely
deny = []
# Highlight specific crates
highlight = "all"

# Build script checking is disabled (allow all build scripts)
# Our dependencies like zstd-sys, zmij require build scripts for native compilation
# [bans.build] section omitted to allow all build scripts by default

# ============================================================
# SOURCES - Source location restrictions
# ============================================================
[sources]
# Crates must come from allowed registries
unknown-registry = "deny"
# Crates must not come from git repositories (prefer crates.io)
unknown-git = "warn"
# Allow private git sources if needed
allow-git = []
# Allow crates from crates.io
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
