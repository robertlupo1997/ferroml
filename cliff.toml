# git-cliff configuration for FerroML changelog generation
# Documentation: https://git-cliff.org/docs/configuration

[changelog]
# Template for the changelog header
header = """
# Changelog

All notable changes to FerroML will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""

# Template for the changelog body
# https://keats.github.io/tera/docs/
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\

{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
            {{ commit.message | upper_first }}
    {% endfor %}
{% endfor %}
"""

# Remove leading and trailing whitespace from the changelog
trim = true

# Template for the changelog footer
footer = """
<!-- Generated by git-cliff -->
"""

# Postprocessors for changelog text
postprocessors = [
    # Remove extra blank lines
    { pattern = '\n{3,}', replace = "\n\n" },
]

[git]
# Parse conventional commits
conventional_commits = true
filter_unconventional = true

# Process each line of a commit as an individual commit
split_commits = false

# Regex for preprocessing commit messages
commit_preprocessors = [
    # Replace issue numbers with links
    { pattern = '\((\w+\s)?#(\d+)\)', replace = "([#${2}](https://github.com/ferroml/ferroml/issues/${2}))" },
]

# Regex for parsing and grouping commits
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^doc", group = "Documentation" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactor" },
    { message = "^style", group = "Styling" },
    { message = "^test", group = "Testing" },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore\\(deps.*\\)", skip = true },
    { message = "^chore\\(pr\\)", skip = true },
    { message = "^chore\\(pull\\)", skip = true },
    { message = "^chore\\(merge\\)", skip = true },
    { message = "^chore|^ci", group = "Miscellaneous Tasks" },
    { body = ".*security", group = "Security" },
    { message = "^revert", group = "Reverts" },
]

# Filter out commits matching these patterns
filter_commits = false

# Tag pattern for version tags
tag_pattern = "v[0-9].*"

# Regex for skipping tags
# skip_tags = ""

# Sort commits by newest first
topo_order = false

# Sort commits by oldest first within a version
sort_commits = "oldest"

# Limit the number of commits included in the changelog
# limit_commits = 42

# Disable remote integration for private repos
# [remote.github]
# owner = "robertlupo1997"
# repo = "ferroml"
