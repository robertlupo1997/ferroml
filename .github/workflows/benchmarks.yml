name: Benchmark Regression Detection

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark-regression:
    name: Benchmark Regression Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-bench-regression-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-regression-

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h /

      - name: Run benchmarks
        run: |
          cargo bench -p ferroml-core -- --noplot 2>&1 | tee bench_output.txt
        continue-on-error: true

      - name: Check for regressions
        id: regression_check
        run: |
          python3 scripts/check_bench_regressions.py \
            --json-output bench_regression_results.json \
            2>&1 | tee regression_report.txt

      - name: Post PR comment with results
        if: github.event_name == 'pull_request' && always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Build comment body from the regression report
          if [ ! -f regression_report.txt ]; then
            echo "No regression report generated."
            exit 0
          fi

          COMMENT_BODY=$(cat <<'HEADER'
          ## Benchmark Regression Report

          <details>
          <summary>Click to expand full results</summary>

          ```
          HEADER
          )

          REPORT=$(cat regression_report.txt)

          COMMENT_BODY="${COMMENT_BODY}
          ${REPORT}
          \`\`\`
          </details>"

          # Check if regression was detected
          if [ -f bench_regression_results.json ]; then
            REGRESSIONS=$(python3 -c "import json; d=json.load(open('bench_regression_results.json')); print(d.get('regressions_count', 0))")
            PASSED=$(python3 -c "import json; d=json.load(open('bench_regression_results.json')); print(d.get('passed_count', 0))")
            COMMENT_BODY="${COMMENT_BODY}

          **Summary:** ${PASSED} passed, ${REGRESSIONS} regression(s)"
          fi

          # Post comment (best effort)
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body "${COMMENT_BODY}" 2>/dev/null || echo "Could not post PR comment (permissions or token issue)"

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-regression-report
          path: |
            bench_output.txt
            regression_report.txt
            bench_regression_results.json
          retention-days: 30

      - name: Add job summary
        if: always()
        run: |
          if [ -f bench_regression_results.json ]; then
            python3 << 'EOF'
          import json
          import os

          with open("bench_regression_results.json") as f:
              data = json.load(f)

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null")
          with open(summary_path, "a") as summary:
              summary.write("## Benchmark Regression Results\n\n")
              summary.write(f"| Metric | Value |\n")
              summary.write(f"|--------|-------|\n")
              summary.write(f"| Benchmarks Checked | {data['total_checked']} |\n")
              summary.write(f"| Passed | {data['passed_count']} |\n")
              summary.write(f"| **Regressions** | **{data['regressions_count']}** |\n")
              summary.write(f"| Missing | {data['missing_count']} |\n")
              summary.write(f"| Threshold | {data['threshold_percent']}% |\n\n")

              if data['regressions']:
                  summary.write("### Regressions\n\n")
                  summary.write("| Benchmark | Expected Upper | Measured | Over |\n")
                  summary.write("|-----------|---------------|----------|------|\n")
                  for r in data['regressions']:
                      summary.write(f"| {r['benchmark']} | {r['expected_upper_us']:.0f} us | {r['measured_us']:.0f} us | +{r['percent_over']:.1f}% |\n")
          EOF
          else
            echo "## Benchmark Regression Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No benchmark data available. Run \`cargo bench -p ferroml-core\` to generate results." >> $GITHUB_STEP_SUMMARY
          fi
