name: Documentation

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build documentation
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-docs

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-docs-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-docs-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build Rust documentation
        run: |
          cargo doc --no-deps --all-features -p ferroml-core

      - name: Build Python API documentation
        run: |
          pip install pdoc maturin
          maturin develop --release -m ferroml-python/Cargo.toml
          pdoc ferroml --output-dir target/doc/python/

      - name: Create documentation index
        run: |
          cat > target/doc/index.html << 'INDEXEOF'
          <!doctype html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>FerroML Documentation</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 600px; margin: 4rem auto; padding: 0 1rem; }
              a { display: block; margin: 1rem 0; padding: 1rem; border: 1px solid #ddd; border-radius: 8px; text-decoration: none; color: #333; }
              a:hover { background: #f5f5f5; border-color: #999; }
              h1 { font-weight: 300; }
              .desc { color: #666; font-size: 0.9rem; }
            </style>
          </head>
          <body>
            <h1>FerroML Documentation</h1>
            <a href="ferroml_core/index.html">
              <strong>Rust API (ferroml-core)</strong>
              <div class="desc">Core library documentation generated by rustdoc</div>
            </a>
            <a href="python/ferroml.html">
              <strong>Python API (ferroml)</strong>
              <div class="desc">Python bindings documentation generated by pdoc</div>
            </a>
          </body>
          </html>
          INDEXEOF

      - name: Fix permissions
        run: |
          chmod -c -R +rX "target/doc/" | while read line; do
            echo "::warning title=Invalid file permissions automatically fixed::$line"
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  # Deploy to GitHub Pages (only on main/master branch pushes)
  deploy:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
