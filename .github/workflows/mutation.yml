name: Mutation Testing

on:
  schedule:
    # Run weekly on Sunday at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      timeout:
        description: 'Timeout per mutant in seconds'
        required: false
        default: '60'
      module:
        description: 'Specific module glob (e.g., ferroml-core/src/models/linear.rs, or empty for all configured modules)'
        required: false
        default: ''

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  mutation-test:
    name: Mutation Testing
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours max for full mutation run

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-mutants-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-mutants-

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h /

      - name: Install cargo-mutants
        run: |
          if ! command -v cargo-mutants &> /dev/null; then
            cargo install cargo-mutants --locked
          fi

      - name: Run mutation testing
        id: mutants
        run: |
          TIMEOUT="${{ github.event.inputs.timeout || '60' }}"

          echo "Running mutation testing with timeout=${TIMEOUT}s"

          # Build the command — mutants.toml handles package, exclusions, and examine_globs
          CMD="cargo mutants --timeout ${TIMEOUT} --output mutants.out"

          # Add module filter if specified via workflow_dispatch
          MODULE="${{ github.event.inputs.module || '' }}"
          if [ -n "${MODULE}" ]; then
            CMD="${CMD} --file '${MODULE}'"
            echo "Filtering to module: ${MODULE}"
          fi

          # Run mutation testing (--lib to skip integration tests for speed)
          echo "::group::Mutation testing output"
          eval ${CMD} -- --release --lib 2>&1 | tee mutants-output.txt || true
          echo "::endgroup::"

          # Parse results from the outcomes directory
          CAUGHT=0
          MISSED=0
          TIMEOUT_COUNT=0
          UNVIABLE=0

          if [ -d mutants.out ]; then
            [ -f mutants.out/caught.txt ] && CAUGHT=$(wc -l < mutants.out/caught.txt | tr -d ' ')
            [ -f mutants.out/missed.txt ] && MISSED=$(wc -l < mutants.out/missed.txt | tr -d ' ')
            [ -f mutants.out/timeout.txt ] && TIMEOUT_COUNT=$(wc -l < mutants.out/timeout.txt | tr -d ' ')
            [ -f mutants.out/unviable.txt ] && UNVIABLE=$(wc -l < mutants.out/unviable.txt | tr -d ' ')
          fi

          TESTED=$((CAUGHT + MISSED))
          TOTAL=$((TESTED + TIMEOUT_COUNT + UNVIABLE))

          if [ "$TESTED" -gt 0 ]; then
            SCORE=$(echo "scale=1; ($CAUGHT * 100) / $TESTED" | bc)
          else
            SCORE="N/A"
          fi

          echo "mutation_score=${SCORE}" >> $GITHUB_OUTPUT
          echo "total=${TOTAL}" >> $GITHUB_OUTPUT
          echo "caught=${CAUGHT}" >> $GITHUB_OUTPUT
          echo "missed=${MISSED}" >> $GITHUB_OUTPUT
          echo "timeout_count=${TIMEOUT_COUNT}" >> $GITHUB_OUTPUT
          echo "unviable=${UNVIABLE}" >> $GITHUB_OUTPUT

          echo ""
          echo "===== MUTATION TESTING SUMMARY ====="
          echo "Caught:   ${CAUGHT}"
          echo "Missed:   ${MISSED}"
          echo "Timeout:  ${TIMEOUT_COUNT}"
          echo "Unviable: ${UNVIABLE}"
          echo "Score:    ${SCORE}%"
          echo "===================================="

      - name: Add job summary
        if: always()
        run: |
          SCORE="${{ steps.mutants.outputs.mutation_score }}"
          CAUGHT="${{ steps.mutants.outputs.caught }}"
          MISSED="${{ steps.mutants.outputs.missed }}"
          TIMEOUT_COUNT="${{ steps.mutants.outputs.timeout_count }}"
          UNVIABLE="${{ steps.mutants.outputs.unviable }}"
          TOTAL="${{ steps.mutants.outputs.total }}"

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Mutation Testing Results

          | Metric | Value |
          |--------|-------|
          | **Mutation Score** | ${SCORE:-N/A}% |
          | Mutants Caught | ${CAUGHT:-0} |
          | Mutants Missed | ${MISSED:-0} |
          | Timed Out | ${TIMEOUT_COUNT:-0} |
          | Unviable | ${UNVIABLE:-0} |
          | **Total** | ${TOTAL:-0} |

          EOF

          # Add missed mutants details if any
          if [ -f mutants.out/missed.txt ] && [ -s mutants.out/missed.txt ]; then
            echo "### Missed Mutants (tests to improve)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            head -100 mutants.out/missed.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload mutation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-results
          path: |
            mutants-output.txt
            mutants.out/
          retention-days: 30

      - name: Annotate with mutation score
        if: always()
        run: |
          SCORE="${{ steps.mutants.outputs.mutation_score }}"
          MISSED="${{ steps.mutants.outputs.missed }}"
          THRESHOLD=70

          if [ -z "$SCORE" ] || [ "$SCORE" = "N/A" ]; then
            echo "::warning::Could not determine mutation score"
            exit 0
          fi

          if (( $(echo "$SCORE < $THRESHOLD" | bc -l) )); then
            echo "::warning::Mutation score ${SCORE}% is below ${THRESHOLD}% threshold (${MISSED} mutants missed)"
          else
            echo "::notice::Mutation score ${SCORE}% meets ${THRESHOLD}% threshold"
          fi
