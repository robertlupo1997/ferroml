name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v0.1.0, v1.0.0, etc.
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Perform a dry run (no actual publish)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      publish_target:
        description: 'Where to publish (testpypi for safe first publish)'
        required: false
        default: 'pypi'
        type: choice
        options:
          - 'pypi'
          - 'testpypi'

permissions:
  contents: read

env:
  PACKAGE_DIR: ferroml-python

jobs:
  # Version check only — CI already runs clippy, tests, and pytest on every push.
  # By the time a tag is pushed, code has passed 22 CI jobs. Re-running here is
  # redundant and fragile (90 test files x dozens of deps = whack-a-mole).
  # See: docs/plans/2026-03-31-publish-workflow-fix.md
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        if: github.event_name == 'push'
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "version=$TAG" >> $GITHUB_OUTPUT

      - name: Verify version matches pyproject.toml and Cargo.toml
        if: github.event_name == 'push'
        run: |
          PYPROJECT_VERSION=$(grep '^version' ${{ env.PACKAGE_DIR }}/pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG_VERSION=${{ steps.version.outputs.version }}
          if [ "$PYPROJECT_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag ($TAG_VERSION) != pyproject.toml ($PYPROJECT_VERSION)"
            exit 1
          fi
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag ($TAG_VERSION) != Cargo.toml ($CARGO_VERSION)"
            exit 1
          fi
          echo "Version verified: $TAG_VERSION"

      - name: Dry run skip
        if: github.event_name == 'workflow_dispatch'
        run: echo "Workflow dispatch — skipping version check (no tag)"

  # Build Linux wheels (x86_64 and aarch64)
  build-linux:
    name: Build Linux (${{ matrix.target }})
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: 'true'
          manylinux: auto
          working-directory: ${{ env.PACKAGE_DIR }}

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: ${{ env.PACKAGE_DIR }}/dist/*.whl

  # Build macOS wheels (x86_64 and arm64)
  build-macos:
    name: Build macOS (${{ matrix.target }})
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-14
          - target: aarch64-apple-darwin
            runner: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: 'true'
          working-directory: ${{ env.PACKAGE_DIR }}

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: ${{ env.PACKAGE_DIR }}/dist/*.whl

  # Build Windows wheels (x86_64)
  build-windows:
    name: Build Windows (x86_64)
    needs: validate
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64-pc-windows-msvc
          args: --release --out dist
          sccache: 'true'
          working-directory: ${{ env.PACKAGE_DIR }}

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64
          path: ${{ env.PACKAGE_DIR }}/dist/*.whl

  # Build source distribution
  build-sdist:
    name: Build Source Distribution
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: ${{ env.PACKAGE_DIR }}

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: ${{ env.PACKAGE_DIR }}/dist/*.tar.gz

  # Publish to PyPI
  publish:
    name: Publish to PyPI
    needs: [build-linux, build-macos, build-windows, build-sdist]
    runs-on: ubuntu-latest
    # Only publish on tag push or explicit non-dry-run
    if: github.event_name == 'push' || (github.event.inputs.dry_run == 'false' && github.event.inputs.publish_target == 'pypi')
    environment:
      name: pypi
      url: https://pypi.org/project/ferroml/
    permissions:
      id-token: write  # Required for trusted publishing
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: List wheels
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # Uses trusted publishing (OIDC) - no token needed

  # Publish to TestPyPI (safe first publish)
  publish-testpypi:
    name: Publish to TestPyPI
    needs: [build-linux, build-macos, build-windows, build-sdist]
    runs-on: ubuntu-latest
    if: github.event.inputs.dry_run == 'false' && github.event.inputs.publish_target == 'testpypi'
    environment:
      name: testpypi
      url: https://test.pypi.org/project/ferroml/
    permissions:
      id-token: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: List wheels
        run: ls -la dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          repository-url: https://test.pypi.org/legacy/
          # Uses trusted publishing (OIDC) - no token needed

  # Dry run - verify wheels can be built but don't publish
  dry-run-check:
    name: Dry Run Check
    needs: [build-linux, build-macos, build-windows, build-sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: List built wheels
        run: |
          echo "=== Built Wheels ==="
          ls -la dist/
          echo ""
          echo "=== Wheel Details ==="
          for wheel in dist/*.whl; do
            echo "Wheel: $wheel"
            python3 -m zipfile -l "$wheel" | head -20
            echo ""
          done

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Smoke test wheel
        run: |
          WHEEL=$(ls dist/*linux*x86_64*.whl 2>/dev/null | head -1)
          if [ -n "$WHEEL" ]; then
            pip install "$WHEEL"
            python -c "import ferroml; print(f'FerroML {ferroml.__version__} imported successfully')"
            python -c "from ferroml.linear import LinearRegression; print('LinearRegression OK')"
            python -c "from ferroml.trees import RandomForestClassifier; print('RandomForestClassifier OK')"
            python -c "from ferroml.preprocessing import StandardScaler; print('StandardScaler OK')"
            pip uninstall -y ferroml
          else
            echo "No compatible wheel found for verification"
          fi

      - name: Dry run summary
        run: |
          echo "=== Dry Run Complete ==="
          echo "Wheels built successfully:"
          ls dist/*.whl | wc -l
          echo "wheel files"
          echo ""
          echo "Source distribution:"
          ls dist/*.tar.gz 2>/dev/null || echo "No sdist"
          echo ""
          echo "To publish, run this workflow again with dry_run=false or push a version tag."
