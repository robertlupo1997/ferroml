name: Generate Changelog

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v0.1.0, v1.0.0, etc.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to generate changelog for (leave empty for unreleased)'
        required: false
        default: ''
        type: string
      update_file:
        description: 'Update CHANGELOG.md file'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      create_pr:
        description: 'Create a PR with changelog updates'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  generate-changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.content }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for changelog generation

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION=${GITHUB_REF#refs/tags/}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Generating changelog for version: $VERSION"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION=${{ github.event.inputs.version }}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Generating changelog for version: $VERSION"
          else
            echo "version=unreleased" >> $GITHUB_OUTPUT
            echo "Generating changelog for unreleased changes"
          fi

      - name: Install git-cliff
        uses: taiki-e/install-action@git-cliff

      - name: Generate changelog for release
        id: changelog
        run: |
          if [ "${{ steps.version.outputs.version }}" = "unreleased" ]; then
            # Generate changelog for unreleased changes only
            CHANGELOG=$(git cliff --unreleased --strip header)
          else
            # Generate changelog for the specific version
            CHANGELOG=$(git cliff --latest --strip header)
          fi

          # Handle multiline output
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate full changelog file
        if: github.event.inputs.update_file == 'true' || github.event_name == 'push'
        run: |
          git cliff --output CHANGELOG.md
          echo "Generated full CHANGELOG.md"
          cat CHANGELOG.md

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: CHANGELOG.md
          if-no-files-found: ignore

      - name: Display changelog
        run: |
          echo "## Generated Changelog"
          echo "${{ steps.changelog.outputs.content }}"

  # Create a PR with changelog updates (optional)
  create-pr:
    name: Create Changelog PR
    needs: generate-changelog
    runs-on: ubuntu-latest
    if: github.event.inputs.create_pr == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@git-cliff

      - name: Generate full changelog
        run: git cliff --output CHANGELOG.md

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: update CHANGELOG.md"
          title: "docs: Update CHANGELOG.md"
          body: |
            This PR updates the CHANGELOG.md with the latest changes.

            ## Changes
            ${{ needs.generate-changelog.outputs.changelog }}

            ---
            *Auto-generated by the changelog workflow*
          branch: update-changelog
          delete-branch: true
          labels: documentation

  # Output changelog for use in release workflow
  output-for-release:
    name: Prepare Release Notes
    needs: generate-changelog
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Save release notes
        run: |
          echo "Release notes for ${{ needs.generate-changelog.outputs.version }}:"
          echo "${{ needs.generate-changelog.outputs.changelog }}"

          # Save to file for potential use by release workflow
          mkdir -p release-notes
          echo "${{ needs.generate-changelog.outputs.changelog }}" > release-notes/RELEASE_NOTES.md

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes/RELEASE_NOTES.md
