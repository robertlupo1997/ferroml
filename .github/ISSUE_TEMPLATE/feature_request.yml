name: Feature Request
description: Suggest a new feature for FerroML
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: What feature would you like to see?
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Why do you need this? What problem does it solve?
    validations:
      required: true

  - type: input
    id: existing
    attributes:
      label: Exists in Other Libraries?
      description: Does sklearn, xgboost, lightgbm, or another library have this?
      placeholder: "e.g., sklearn.ensemble.StackingClassifier"

  - type: textarea
    id: api
    attributes:
      label: Proposed API (optional)
      description: How would you like to use this feature?
      render: python
